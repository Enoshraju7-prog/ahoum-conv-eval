version: "3.9"

services:

  # Ollama — runs the local LLM
  ollama:
    image: ollama/ollama:latest
    container_name: ahoum_ollama
    ports:
      - "11434:11434"       # Ollama API port
    volumes:
      - ollama_data:/root/.ollama   # persists downloaded models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Pulls the model after Ollama is healthy — runs once then exits
  model-pull:
    image: ollama/ollama:latest
    container_name: ahoum_model_pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["ollama", "pull", "qwen2.5:7b"]
    volumes:
      - ollama_data:/root/.ollama

  # FastAPI backend
  api:
    build: .
    container_name: ahoum_api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://ollama:11434/api/generate  # points to the ollama service
    volumes:
      - ./data:/app/data    # persists scores between runs
    depends_on:
      model-pull:
        condition: service_completed_successfully
    restart: unless-stopped

  # Streamlit UI
  ui:
    build: .
    container_name: ahoum_ui
    command: streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://api:8000    # points to the api service
    depends_on:
      - api
    restart: unless-stopped

volumes:
  ollama_data:
